name: Deploy House Price App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd house

            git pull origin main

            docker stop house-price-container || true
            docker rm house-price-container || true

            docker build -t house-price-app .

            docker run -d \
              --name house-price-container \
              -p 5000:5000 \
              house-price-app